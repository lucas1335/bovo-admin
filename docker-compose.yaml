version: '3.8'

services:
  bovo-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bovo-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - TZ=Asia/Shanghai
    networks:
      - bovo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  bovo-network:
    driver: bridge
